name: Content Generation

on:
  workflow_dispatch: # manual trigger from GitHub Actions UI

jobs:
  generate:
    name: Generate 3 drafts
    runs-on: ubuntu-latest
    steps:
      - name: Trigger content generation
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST https://catalogue.gallery/api/content-generate \
            -H "x-content-lab-password: ${{ secrets.CONTENT_LAB_PASSWORD }}")
          echo "Response: $response"
          if [ "$response" != "200" ]; then
            echo "Generation failed with status $response"
            exit 1
          fi
          echo "3 drafts generated successfully"
