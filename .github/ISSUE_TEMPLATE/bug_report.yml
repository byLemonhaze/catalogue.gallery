name: Bug report
description: Report a reproducible defect in the website, API, or Studio workflow.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve `catalogue.gallery`.

        For security vulnerabilities, do not open a public issue. Use the private reporting process in `SECURITY.md` or GitHub private vulnerability reporting instead.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug in one or two sentences.
      placeholder: The directory page fails to load when...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List exact steps so the issue can be reproduced.
      placeholder: |
        1. Open ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
      placeholder: The page should...
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
      placeholder: Instead, the page...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, device, OS, and if relevant the route or API endpoint.
      placeholder: Chrome 135 on macOS, /artists
  - type: textarea
    id: evidence
    attributes:
      label: Logs, screenshots, or extra context
      description: Paste console output, error text, screenshots, or related links.
