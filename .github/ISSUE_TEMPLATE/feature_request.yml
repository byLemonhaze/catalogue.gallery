name: Feature request
description: Propose a focused improvement to the catalogue, workflow, or editorial tooling.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What is missing or painful today?
      placeholder: Artists cannot easily...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the change you want to see.
      placeholder: Add a way to...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention workarounds or other approaches if you considered them.
  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      description: Who benefits and how should success be evaluated?
